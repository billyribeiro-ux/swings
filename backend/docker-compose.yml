services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/swings
      - JWT_SECRET=explosive-swings-jwt-secret-key-2026
      - JWT_EXPIRATION_HOURS=24
      - PORT=3001
      - FRONTEND_URL=http://localhost:5180
      - UPLOAD_DIR=./uploads
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads-data:/app/uploads

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=swings
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
  uploads-data:
