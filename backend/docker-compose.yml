# ──────────────────────────────────────────────────────────────────────────
# Test-harness Postgres (port 5433, user/db `postgres/postgres`).
#
# This file exists ONLY to give the in-process integration-test harness
# (`backend/tests/support/`) a deterministic, isolated database that
# never collides with a developer's local 5432 instance or the full
# stack defined by the root-level `docker-compose.yml` (which uses
# port 5432 and the `swings/swings_secret` credentials).
#
# Usage:
#
#   docker compose -f backend/docker-compose.yml up -d db
#   DATABASE_URL_TEST=postgres://postgres:postgres@localhost:5433/swings \
#     cargo test --manifest-path backend/Cargo.toml
#
# For end-to-end local dev (frontend + backend + db on a single network),
# use the root `docker-compose.yml` instead.
# ──────────────────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: swings
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d swings"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-test-data:/var/lib/postgresql/data

volumes:
  postgres-test-data:
