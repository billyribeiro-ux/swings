# cargo-deny configuration — license + advisory baseline.
#
# Run: `cargo deny --manifest-path backend/Cargo.toml check licenses`
# (and optionally `check advisories` / `check bans`).
#
# License allowlist seeded from the actual dep graph
# (`Unicode-DFS-2016`, `Unicode-3.0` from ICU-derived crates; `OpenSSL` is
# kept defensive — we use rustls but transient deps occasionally pull it
# in; `Apache-2.0 WITH LLVM-exception` is a SPDX exception expression).

[graph]
all-features = false
no-default-features = false

[licenses]
# v2 schema: rejection is implicit when the SPDX expression isn't on `allow`.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "0BSD",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "MPL-2.0",
    "ISC",
    "CC0-1.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "OpenSSL",
    # `webpki-roots` is just the Mozilla trust-anchor list packaged as a
    # crate; the CDLA-Permissive-2.0 license is permissive-data, no
    # copyleft for downstream code. Required by sqlx + reqwest + lettre.
    "CDLA-Permissive-2.0",
]
# Crates that ship without a machine-readable license field but whose
# license is well-known. Keep this list short and link-justified.
confidence-threshold = 0.8
# Skip license checks for the first-party crate (`license = "UNLICENSED"`,
# `publish = false`). UNLICENSED is not a valid SPDX expression so it
# cannot be `allow`-listed; the private-crate skip is the standard
# cargo-deny escape hatch for in-tree binaries.
private = { ignore = true, registries = ["https://github.com/rust-lang/crates.io-index"] }

[[licenses.clarify]]
# `ring` is BoringSSL-derived; the upstream maintainers explicitly call
# their licensing "OpenSSL/ISC". cargo-deny needs a manual nudge.
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[advisories]
version = 2
yanked = "warn"
# The `RUSTSEC-*` IDs the project has triaged go here. Keep empty until
# `cargo deny check advisories` flags something the team chooses to defer.
ignore = []

[bans]
multiple-versions = "allow"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
