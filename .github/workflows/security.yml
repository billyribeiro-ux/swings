name: Security

on:
  pull_request:
  push:
    branches:
      - main
      - master
  schedule:
    # Nightly at 03:00 UTC — picks up newly disclosed advisories even on
    # quiet branches.
    - cron: '0 3 * * *'

concurrency:
  # Scope by event so a PR push cannot cancel a running nightly scheduled
  # scan. PRs/pushes against the same ref still coalesce (cancel-in-progress
  # remains true for those), but `schedule` runs get their own queue under
  # `<workflow>-schedule`, isolated from interactive triggers.
  group: ${{ github.workflow }}-${{ github.event_name == 'schedule' && 'schedule' || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

permissions:
  contents: read

# Opt JS actions into Node.js 24 ahead of GitHub's June 2026 forced switch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        # Pinned — matches `rust-toolchain.toml` and `Dockerfile`.
        uses: dtolnay/rust-toolchain@2ea1b3bdd0261867664fd125505456a7b9c3385c # 1.93

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: backend
          shared-key: cargo-audit

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@acd08f184561622f67f0e4406a62a10f656777a9 # v1.12.0

      - name: Install cargo-audit
        run: cargo binstall --no-confirm --force cargo-audit

      - name: Run cargo audit
        # `--deny warnings` treats unmaintained / yanked crates as hard
        # failures alongside CVEs; loosen if the noise becomes unmanageable.
        run: cargo audit --deny warnings

  pnpm-audit:
    name: pnpm Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit — high / critical (blocking)
        run: pnpm audit --audit-level=high

      - name: pnpm audit — moderate (visibility only)
        # Non-blocking: surfaces moderate advisories in the build log for
        # triage without failing the PR. Remove `continue-on-error` once the
        # moderate backlog is groomed.
        continue-on-error: true
        run: pnpm audit --audit-level=moderate

  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Trivy filesystem scan
        # Pinned to a release tag (not @master) so a supply-chain compromise
        # on the action repo cannot alter scanner behaviour silently.
        #
        # Scanner scoping — we intentionally narrow Trivy to:
        #   * secret   — committed credentials / API keys (Trivy's strongest
        #                unique contribution)
        #   * misconfig — Dockerfile, Terraform, Kubernetes manifests, CI
        #                workflows (catches IaC drift / insecure defaults)
        # Language-ecosystem vulns (cargo / pnpm) are owned by the dedicated
        # `cargo-audit` and `pnpm-audit` jobs above. Those scanners track
        # RustSec / GHSA directly and have higher precision than Trivy's
        # language plugin. Double-scanning produces duplicate findings and
        # encourages suppressing the same CVE in two places.
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          # IMPORTANT: honour the `severity` filter for the exit-code gate.
          # Without this, trivy-action's entrypoint UNSETs TRIVY_SEVERITY
          # when generating SARIF (so the SARIF upload covers every level
          # for Code Scanning), which silently causes any LOW/MEDIUM
          # finding to blow up the job. See `entrypoint.sh` in the
          # action source: `unset TRIVY_SEVERITY`.
          limit-severities-for-sarif: true
          # Path-based exclusions. Trivy's `.trivyignore` file is specifically
          # for vulnerability-ID suppressions (CVE-XXXX, GHSA-XXXX); use the
          # action's first-class `skip-dirs` / `skip-files` inputs for paths
          # so the scanner's own glob matcher handles them consistently with
          # its internal engine.
          skip-dirs: 'node_modules,.svelte-kit,.vercel,.netlify,dist,build,backend/target,backend/tests/snapshots,backend/uploads'
          trivyignores: .trivyignore
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF (best effort)
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs
