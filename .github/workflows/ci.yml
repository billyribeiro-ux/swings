name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Opt every JavaScript-based Action in this workflow into the Node.js 24
# runtime ahead of GitHub's forced switchover (June 2026). This silences
# the "Node.js 20 actions are deprecated" annotations and flushes out any
# incompatibility against the new runtime in our CI rather than prod.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  frontend:
    name: Frontend Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend CI checks
        run: pnpm ci:frontend

  backend:
    name: Backend Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Run backend CI checks
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test
          cargo build

  backend-coverage:
    # Informational: establishes a baseline for future gating. Do not block
    # PRs on coverage numbers until we decide a threshold.
    name: Backend Coverage (informational)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
          shared-key: backend-coverage

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@v1.12.0

      - name: Install cargo-llvm-cov
        # TODO: if cargo-llvm-cov proves too heavy on the default runner,
        # swap to `cargo tarpaulin` (which avoids the llvm-tools download).
        run: cargo binstall --no-confirm --force cargo-llvm-cov

      - name: Generate coverage (lcov)
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-lcov
          path: backend/lcov.info
          if-no-files-found: error
          retention-days: 14
