name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Opt every JavaScript-based Action in this workflow into the Node.js 24
# runtime ahead of GitHub's forced switchover (June 2026). This silences
# the "Node.js 20 actions are deprecated" annotations and flushes out any
# incompatibility against the new runtime in our CI rather than prod.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  frontend:
    name: Frontend Quality
    runs-on: ubuntu-latest
    # Bound runaway CI jobs so a hung step doesn't burn the queue.
    # `pnpm ci:frontend` should finish inside 5 min on the default
    # runner; 15 is generous headroom for cache-cold runs.
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend CI checks
        run: pnpm ci:frontend

  backend:
    name: Backend Quality
    runs-on: ubuntu-latest
    # Cold-cache Rust CI takes ~5-8 min; 25 is enough headroom for a
    # runner doing first-time clippy + test + build, bounded.
    timeout-minutes: 25
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        # Pinned to the channel declared in `rust-toolchain.toml` so CI,
        # dev, and the Docker builder all resolve to the same compiler.
        # Bump in lockstep with `Dockerfile` when upgrading.
        uses: dtolnay/rust-toolchain@2ea1b3bdd0261867664fd125505456a7b9c3385c # 1.93
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: backend

      - name: Run backend CI checks
        # Embed the full commit SHA into the build so `/version` reports it.
        env:
          GIT_SHA: ${{ github.sha }}
          GIT_SHA_LONG: ${{ github.sha }}
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test
          cargo build

  backend-coverage:
    # Informational: establishes a baseline for future gating. Do not block
    # PRs on coverage numbers until we decide a threshold.
    name: Backend Coverage (informational)
    runs-on: ubuntu-latest
    # Coverage builds are slower (instrumented) — give extra headroom.
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        # Pinned — see `backend` job above.
        uses: dtolnay/rust-toolchain@2ea1b3bdd0261867664fd125505456a7b9c3385c # 1.93
        with:
          components: llvm-tools-preview

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: backend
          shared-key: backend-coverage

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@acd08f184561622f67f0e4406a62a10f656777a9 # v1.12.0

      - name: Install cargo-llvm-cov
        # TODO: if cargo-llvm-cov proves too heavy on the default runner,
        # swap to `cargo tarpaulin` (which avoids the llvm-tools download).
        run: cargo binstall --no-confirm --force cargo-llvm-cov

      - name: Generate coverage (lcov)
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: backend-lcov
          path: backend/lcov.info
          if-no-files-found: error
          retention-days: 14

  e2e-smoke:
    # Fast, frontend-only Playwright suite — runs the Chromium smoke
    # projects against `pnpm build && pnpm preview` (SSR prod build, no
    # dev-server HMR). This is the CI tripwire for the public marketing
    # routes; the heavier `auth`/`popups`/`admin` suites need a running
    # backend + seeded DB and are NOT run here. Run them manually or in a
    # dedicated workflow once the stack is containerised.
    name: E2E Smoke (Chromium)
    runs-on: ubuntu-latest
    # Build + install + preview + smoke = ~4–6 min on a warm runner.
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Install Playwright Chromium
        # `--with-deps` pulls in the Linux font + libnss3 stack the browser
        # needs on fresh ubuntu-latest runners. No webkit / firefox — we
        # only run the Chromium smoke project here.
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright smoke (Chromium)
        env:
          CI: 'true'
        run: pnpm exec playwright test --project=smoke-chromium

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
