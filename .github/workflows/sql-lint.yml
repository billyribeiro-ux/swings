name: SQL Lint

on:
  pull_request:
    paths:
      - 'backend/migrations/**'
      - '.sqlfluff'
      - '.github/workflows/sql-lint.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'backend/migrations/**'
      - '.sqlfluff'
      - '.github/workflows/sql-lint.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sqlfluff:
    name: sqlfluff Postgres
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install sqlfluff
        # Use pipx so the CLI is isolated from system Python and survives
        # runner caching cleanly. Pin the version so new rule defaults do
        # not quietly start failing existing migrations.
        run: |
          python -m pip install --upgrade pip
          pip install --user 'sqlfluff==3.2.5'

      - name: sqlfluff version
        run: sqlfluff --version

      - name: Lint migrations
        # `lint` is soft in this config (severe rules disabled via
        # `.sqlfluff`). New anti-patterns surface as warnings; truly broken
        # SQL still fails the job.
        run: sqlfluff lint backend/migrations --dialect postgres
