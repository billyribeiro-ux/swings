name: SQL Lint

on:
  pull_request:
    paths:
      - 'backend/migrations/**'
      - '.sqlfluff'
      - '.github/workflows/sql-lint.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'backend/migrations/**'
      - '.sqlfluff'
      - '.github/workflows/sql-lint.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Opt JS actions into Node.js 24 ahead of GitHub's June 2026 forced switch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  sqlfluff:
    name: sqlfluff Postgres
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          # No `cache: pip` — we have no requirements.txt / pyproject.toml
          # to drive the cache key. sqlfluff is a single pinned install,
          # downloading it each run (~2 s) costs less than maintaining a
          # sidecar lockfile just for the cache.

      - name: Install sqlfluff
        # Pin the version so new rule defaults do not quietly start
        # failing existing migrations; upgrade deliberately.
        run: |
          python -m pip install --upgrade pip
          pip install --user 'sqlfluff==3.2.5'

      - name: sqlfluff version
        run: sqlfluff --version

      - name: Lint migrations
        # `lint` is soft in this config (severe rules disabled via
        # `.sqlfluff`). New anti-patterns surface as warnings; truly broken
        # SQL still fails the job.
        run: sqlfluff lint backend/migrations --dialect postgres
